<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OXV — Membre Fondateur</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --noir:#0A0A0A; --blanc:#FFFFFF; --rouge:#C8102E;
    --gris:#8A8A8A; --ligne:#1E1E1E; --champ:#111111;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--noir); color:var(--blanc);
    font-family:'Inter',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{width:100%; max-width:460px}
  .logo{
    font-family:'Syncopate',sans-serif; font-weight:700; letter-spacing:.28em;
    font-size:34px; text-align:center; margin-bottom:6px;
  }
  .logo span{color:var(--rouge)}
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.32em;
    text-transform:uppercase; color:var(--gris); text-align:center; margin-bottom:38px;
  }
  form{display:flex; flex-direction:column; gap:18px}
  label{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--gris); margin-bottom:8px; display:block;
  }
  input[type=text], input[type=email]{
    width:100%; background:var(--champ); border:1px solid var(--ligne);
    color:var(--blanc); font-family:'Inter',sans-serif; font-size:15px;
    padding:13px 14px; outline:none; transition:border-color .15s;
  }
  input:focus{border-color:var(--rouge)}
  input::placeholder{color:#3A3A3A}
  .seg{display:flex; gap:10px}
  .seg label{flex:1; margin:0; cursor:pointer}
  .seg input{position:absolute; opacity:0; pointer-events:none}
  .seg .opt{
    display:block; text-align:center; padding:13px; border:1px solid var(--ligne);
    background:var(--champ); font-size:14px; letter-spacing:.06em; transition:all .15s;
    text-transform:none; color:var(--blanc); font-family:'Inter',sans-serif;
  }
  .seg input:checked + .opt{border-color:var(--rouge); background:rgba(200,16,46,.08)}
  .consent{display:flex; gap:10px; align-items:flex-start}
  .consent input{margin-top:3px; accent-color:var(--rouge)}
  .consent span{font-size:12px; color:var(--gris); line-height:1.5}
  button{
    background:var(--rouge); color:var(--blanc); border:none;
    font-family:'Syncopate',sans-serif; font-weight:700; letter-spacing:.16em;
    font-size:13px; text-transform:uppercase; padding:16px; cursor:pointer;
    transition:opacity .15s; margin-top:6px;
  }
  button:hover{opacity:.9}
  button:disabled{opacity:.4; cursor:not-allowed}
  .manifesto{
    font-size:12px; color:var(--gris); text-align:center; margin-top:28px;
    font-style:italic; line-height:1.6;
  }
  .state{text-align:center; padding:20px 0}
  .state h2{font-family:'Syncopate',sans-serif; font-size:16px; letter-spacing:.1em; margin-bottom:14px}
  .state p{color:var(--gris); font-size:14px; line-height:1.6}
  .err{color:var(--rouge); font-size:13px; text-align:center; min-height:18px}
  .hidden{display:none}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">O<span>X</span>V</div>
    <div class="eyebrow">Membre Fondateur</div>

    <form id="f">
      <div>
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" required placeholder="Prénom" />
      </div>
      <div>
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" required placeholder="Nom" />
      </div>
      <div>
        <label for="fonction">Fonction professionnelle</label>
        <input type="text" id="fonction" name="fonction_pro" placeholder="Fonction" />
      </div>
      <div>
        <label for="vehicule">Véhicule</label>
        <input type="text" id="vehicule" name="vehicule" placeholder="Marque · Modèle" />
      </div>
      <div>
        <label>Préférence de session</label>
        <div class="seg">
          <label><input type="radio" name="session_pref" value="lundi" required /><span class="opt">Lundi</span></label>
          <label><input type="radio" name="session_pref" value="vendredi" /><span class="opt">Vendredi</span></label>
        </div>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="adresse@email.com" />
      </div>
      <label class="consent">
        <input type="checkbox" id="consent" required />
        <span>J'accepte que mes informations soient traitées par OXV aux fins de gestion de la relation Membre Fondateur, conformément au RGPD.</span>
      </label>
      <div class="err" id="err"></div>
      <button type="submit" id="submit">Confirmer mon intérêt</button>
    </form>

    <div class="state hidden" id="ok">
      <h2>Intérêt enregistré</h2>
      <p>Un email de confirmation vous a été adressé.<br />Le document à signer vous parvient séparément.</p>
    </div>

    <div class="manifesto">« Vous ne pilotez contre personne d'autre que vous-même. »<br />— Le principe OXV</div>
  </div>

<script>
  // Remplacez par l'URL de votre edge function déployée.
  const ENDPOINT = "https://fouvuqkdxarjpjbqnsjq.supabase.co/functions/v1/capture-membre-fondateur";
  const FORM_TOKEN = "oxvmf_LwcPSvaNizRJTvDIPWfB6s3Nd5AFZiZuo1yDVjSgcp5qOS62793Li4un"; // = valeur du secret OXV_FORM_TOKEN

  const f = document.getElementById("f");
  const err = document.getElementById("err");
  const btn = document.getElementById("submit");

  f.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.textContent = "";
    btn.disabled = true;
    btn.textContent = "Envoi…";

    const data = Object.fromEntries(new FormData(f).entries());
    data.consent_rgpd = document.getElementById("consent").checked;

    try {
      const r = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-oxv-form-token": FORM_TOKEN },
        body: JSON.stringify(data),
      });
      if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || "Erreur");
      f.classList.add("hidden");
      document.getElementById("ok").classList.remove("hidden");
    } catch (e) {
      err.textContent = "Une erreur est survenue. Merci de réessayer.";
      btn.disabled = false;
      btn.textContent = "Confirmer mon intérêt";
    }
  });
</script>
</body>
</html>
